type: match
key: sqli_probe
name: SQL Injection Probe
description: >
  A web request whose (URL-decoded) path or query string contains common
  SQL-injection signatures — UNION SELECT, boolean tautologies, stacked
  DROP statements, or information_schema enumeration.
severity: high
mitre_technique: T1190          # Exploit Public-Facing Application
enabled: true
selection:
  protocol: http
field: raw.path
decode: url
patterns:
  - "(?i)union\\s+select"
  - "(?i)\\bor\\s+1\\s*=\\s*1\\b"
  - "(?i)'\\s*or\\s*'1'\\s*=\\s*'1"
  - "(?i)information_schema"
  - "(?i);\\s*drop\\s+table"
