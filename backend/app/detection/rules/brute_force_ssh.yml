# Sigma-style detection rule. Rules are data, not code — add a detection by
# dropping a YAML file here, never by editing Python `if` statements.
type: threshold
key: brute_force_ssh
name: SSH Brute-Force Attempt
description: >
  Five or more failed SSH authentications from a single source IP within
  60 seconds, indicating password guessing.
severity: high
mitre_technique: T1110          # Brute Force
enabled: true
selection:
  protocol: ssh
  raw.outcome: [failed, invalid_user]
group_by: source_ip
window_seconds: 60
threshold: 5
